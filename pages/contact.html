    <link rel="stylesheet" href="../css/style.css">

    <link href="https://fonts.googleapis.com/css2?family=Roboto:wght@300;400;700&display=swap" rel="stylesheet">

<body class="container">
    <header>
        <nav class="entete">
            <a class="logo" href="../index.html" aria-label="Retour à l'accueil"><span>Ro</span>ma<b>.</b></a>
            <ul class="menu">
                <li><a href="../index.html">Accueil</a></li>
                <li><a href="./about.html">À propos</a></li>
                <li><a href="./projets.html">Projets</a></li>
                <li><a href="./contact.html">Contact</a></li>
            </ul>
        </nav>
    </header>

    <main>
        <section class="contact">
            <h2>Contactez-moi</h2>
            <form>
                <label for="name">Nom :</label>
                <input type="text" id="name" name="name" required>

                <label for="email">Email :</label>
                <input type="email" id="email" name="email" required>

                <label for="subject">Objet :</label>
                <input type="text" id="subject" name="subject" required>

                <label for="message">Message :</label>
                <textarea name="message" id="message" required></textarea>
                <button type="submit">Envoyer</button>
            </form>

            <h2>Demande de projet</h2>
            <form class="project-request">
                <label for="client_name">Nom :</label>
                <input type="text" id="client_name" name="client_name" required>

                <label for="client_email">Email :</label>
                <input type="email" id="client_email" name="client_email" required>

                <label for="project_description">Description du projet :</label>
                <textarea name="project_description" id="project_description" required></textarea>

                <label for="budget">Budget estimé :</label>
                <input type="text" id="budget" name="budget">

                <button type="submit">Envoyer la demande</button>
            </form>

            <div class="contact-info">
                <a href="tel:778382833" aria-label="Téléphoner à Romaric"><i class="fa fa-phone"></i></a>
                <a href="mailto:romaricdossou18@gmail.com" aria-label="Envoyer un email à Romaric"><i class="fa fa-envelope"></i></a>
                <a href="https://www.linkedin.com/in/romaric-dossou-38343a3ab/" target="_blank" rel="noopener noreferrer" aria-label="Voir le profil LinkedIn de Romaric"><i class="fa fa-linkedin"></i></a>
            </div>
        </section>
    </main>

    <footer>

    </footer>
</body>
</html>
